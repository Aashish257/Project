<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="title">
            <h1>Student portal</h1>
        </div>
    </header>
    <section>
        <div class="search">
            <input type="text" name="search" id="search" placeholder="Search">
            <button>Search</button>
        </div>
        <div class="filter">
            <button id="sortAZ">Sort A->Z</button>
            <button id="sortZA">Sort Z->A</button>
            <button id="sortByMarks">Sort By Marks</button>
            <button id="sortByPassing">Sort By Passing</button>
            <button id="sortByClass">Sort By Class</button>
            <button id="sortByGender">Sort By Gender</button>
        </div>
        <table id="studentTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Class</th>
                    <th>Marks</th>
                    <th>Passing</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="tableBody">
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
              <td></td>
            </tbody>
        </table>
    </section>
    <script src="script.js"></script>
</body>

</html>
